about_me: >-
  I am Jeongmin Park, an M.S. student at SILAB KAIST. My research interests include machine learning and AI systems. I am passionate about exploring the latest advancements in AI and applying them to solve real-world problems. I am currently working on several projects related to generative model alignment and multi-modal AI. In my free time, I enjoy reading research papers, coding, and sharing my knowledge through this blog.

publication_note: >-
  Publication notes are short posts where I explain each paper in plain language,
  including motivation, key idea, and takeaways.

