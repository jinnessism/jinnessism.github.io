about_me: >-
  I am <strong>Jeongmin Park, an M.S. student at <a href='https://silab.kaist.ac.kr/'>SILAB KAIST</a></strong>. My research interests include multi-modal AI and generative model alignment. I am passionate about exploring the latest advancements in AI and applying them to solve real-world problems. In my free time, I enjoy reading research papers, coding, and sharing my knowledge through this blog.
  I am also open to collaborations, discussions on AI research or even casual conversations. So feel free to reach out to me via email or social media!

publication_note: >-
  Publication notes are short posts where I explain each paper in plain language,
  including motivation, key idea, and takeaways.

